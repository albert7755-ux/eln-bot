name: 基金淨值＋殖利率自動更新
on:
  schedule:
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

jobs:
  update-fund-nav:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          pip install requests beautifulsoup4 gspread google-auth pandas
      - name: Update fund NAV
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python update_fund_nav_moneydj.py
      - name: Update yield data
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python update_yield_data.py
