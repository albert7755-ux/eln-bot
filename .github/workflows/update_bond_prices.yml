name: 債券價格自動更新

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'update=今天價格 backfill=補齊歷史'
        required: true
        default: 'update'
        type: choice
        options:
          - update
          - backfill

jobs:
  update-bond-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: |
          pip install selenium webdriver-manager gspread google-auth pandas requests

      - name: Run daily update
        if: ${{ github.event_name == 'schedule' || inputs.mode == 'update' }}
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          BOND_DRIVE_FOLDER_ID: ${{ secrets.BOND_DRIVE_FOLDER_ID }}
          TV_SESSION_ID: ${{ secrets.TV_SESSION_ID }}
          LINE_ACCESS_TOKEN: ${{ secrets.AGENT_LINE_CHANNEL_ACCESS_TOKEN }}
          ELN_PERSONAL_CHAT_KEY: ${{ secrets.ELN_PERSONAL_CHAT_KEY }}
        run: python bond_backfill.py

      - name: Run historical backfill
        if: ${{ inputs.mode == 'backfill' }}
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          BOND_DRIVE_FOLDER_ID: ${{ secrets.BOND_DRIVE_FOLDER_ID }}
          TV_SESSION_ID: ${{ secrets.TV_SESSION_ID }}
          LINE_ACCESS_TOKEN: ${{ secrets.AGENT_LINE_CHANNEL_ACCESS_TOKEN }}
          ELN_PERSONAL_CHAT_KEY: ${{ secrets.ELN_PERSONAL_CHAT_KEY }}
        run: python bond_backfill.py
